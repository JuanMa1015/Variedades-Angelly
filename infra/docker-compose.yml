services:
  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    container_name: variedades_angelly_backend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_COBRO_BANCO: ${VITE_COBRO_BANCO:-Bancolombia}
        VITE_COBRO_TIPO_CUENTA: ${VITE_COBRO_TIPO_CUENTA:-Ahorros}
        VITE_COBRO_NUMERO_CUENTA: ${VITE_COBRO_NUMERO_CUENTA:-58440719897}
        VITE_COBRO_TITULAR_CUENTA: ${VITE_COBRO_TITULAR_CUENTA:-Juan Gonzalez}
        VITE_COBRO_NEQUI_NUMERO: ${VITE_COBRO_NEQUI_NUMERO:-3226515399}
        VITE_COBRO_NEQUI_TITULAR: ${VITE_COBRO_NEQUI_TITULAR:-Juan Gonzalez}
    container_name: variedades_angelly_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
