services:
  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    container_name: variedades_angelly_backend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: variedades_angelly_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
