services:
  db:
    image: postgres:15-alpine
    container_name: variedades_angelly_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: variedades_angelly
      POSTGRES_USER: angelly_user
      POSTGRES_PASSWORD: angelly_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U angelly_user -d variedades_angelly"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    container_name: variedades_angelly_backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://angelly_user:angelly_pass_2026@db:5432/variedades_angelly
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
      args:
        VITE_API_URL: /api
    container_name: variedades_angelly_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
    name: postgres_data
